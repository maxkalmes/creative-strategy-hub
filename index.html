<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kopari Creative Strategy</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  const firebaseConfig = {
    apiKey:"AIzaSyDgsDI8pORzW498xSQRKpx_y5t0vP21rpU",
    authDomain:"kopari-tracker.firebaseapp.com",
    databaseURL:"https://kopari-tracker-default-rtdb.firebaseio.com",
    projectId:"kopari-tracker",
    storageBucket:"kopari-tracker.firebasestorage.app",
    messagingSenderId:"242410831408",
    appId:"1:242410831408:web:ff3f73855b000d4d5db7f5"
  };
  const app=initializeApp(firebaseConfig);
  const db=getDatabase(app);
  window.__fbDb=db;window.__fbRef=ref;window.__fbSet=set;window.__fbOn=onValue;
  window.__fbReady=true;
  document.dispatchEvent(new Event("fb-ready"));
</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal:#2ABFBF;--cream:#F0EDE4;--navy:#1B4B5A;--brown:#6B4A0B;
  --lime:#C8E000;--pink:#FF3EBF;--blush:#F9D9E7;--yellow:#F5E642;
  --bg:#F7F5F1;--surface:#FFFFFF;--border:#E8E4DC;
  --text:#1a1a1a;--muted:#8a8278;--subtle:#b8b0a6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:'Plus Jakarta Sans',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.l-logo{font-weight:800;font-size:13px;letter-spacing:.22em;color:var(--navy);text-transform:uppercase}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.ldot{width:9px;height:9px;border-radius:50%;background:var(--teal);display:inline-block;animation:pulse 1.3s ease-in-out infinite}

.top-bar{background:var(--navy);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.tb-brand{font-weight:800;font-size:12px;letter-spacing:.22em;color:var(--teal);text-transform:uppercase}
.tb-sep{color:#2d6070;margin:0 14px;font-size:20px;font-weight:100}
.tb-title{font-weight:600;font-size:13px;color:#fff;opacity:.9}
.sync-wrap{display:flex;align-items:center;gap:7px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0;transition:background .4s}
.sync-txt{font-size:11px;color:#6da8b8;font-weight:500}

.page{padding:32px;max-width:1480px;margin:0 auto}

.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:26px;flex-wrap:wrap}
.bc-item{font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:color .15s}
.bc-item:hover{color:var(--text)}.bc-item.active{color:var(--text)}
.bc-sep{color:var(--border);font-size:16px}

.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.page-title{font-weight:800;font-size:26px;color:var(--text);letter-spacing:-.4px;line-height:1.2}
.page-sub{font-size:12px;color:var(--subtle);margin-top:5px;font-weight:500}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.stats-row{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 20px;flex:1;min-width:110px}
.stat-num{font-weight:800;font-size:22px;color:var(--text);line-height:1}
.stat-label{font-size:11px;color:var(--subtle);font-weight:500;margin-top:4px}
.stat.highlight{background:var(--navy);border-color:var(--navy)}
.stat.highlight .stat-num{color:var(--teal)}
.stat.highlight .stat-label{color:#6da8b8}

.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap}
.ftab{padding:7px 15px;border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border:1.5px solid transparent;background:var(--surface);transition:all .15s}
.ftab:hover{background:var(--cream)}.ftab.active{background:var(--navy);color:#fff;border-color:var(--navy)}

.btn{padding:9px 18px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.01em;white-space:nowrap}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:#153d4a}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:#22aaa9}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--cream)}
.btn-danger{background:#fee2e2;color:#dc2626;border:none}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:6px 13px;font-size:11px;border-radius:8px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:7px}

.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.pcard{background:var(--surface);border-radius:18px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s}
.pcard:hover{box-shadow:0 6px 24px rgba(27,75,90,.1);transform:translateY(-2px);border-color:var(--teal)}
.pcard-top{padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--cream)}
.pcard-name{font-weight:800;font-size:15px;color:var(--text);line-height:1.3}
.angle-count-pill{background:var(--cream);color:var(--navy);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pcard-body{padding:14px 20px 16px}
.pcard-preview{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
.pcard-angles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.angle-chip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1.5px solid;white-space:nowrap}
.pcard-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pcard-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s}
.pcard:hover .pcard-actions{opacity:1}

.stage-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}

.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.detail-title{font-weight:800;font-size:24px;color:var(--text);letter-spacing:-.3px}
.detail-sub{font-size:12px;color:var(--subtle);margin-top:4px;font-weight:500}

.itabs{display:flex;gap:4px;background:var(--cream);border-radius:12px;padding:4px;width:fit-content;margin-bottom:26px}
.itab{padding:8px 18px;border-radius:9px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:transparent;transition:all .15s}
.itab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.09)}

.strategy-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.strategy-grid{grid-template-columns:1fr}}
.sq-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;transition:border-color .15s}
.sq-card:focus-within{border-color:var(--teal)}
.sq-cat{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.05em;margin-bottom:7px}
.cat-main{background:#e0f7f7;color:#0e7070}.cat-awareness{background:#ede9fe;color:#5b21b6}
.cat-hook{background:#fef9c3;color:#854d0e}.cat-conversion{background:var(--blush);color:#9d174d}
.sq-q{font-size:12px;font-weight:600;color:#374151;margin-bottom:9px;line-height:1.5}

.angles-list{display:flex;flex-direction:column;gap:12px}
.angle-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:all .2s}
.angle-card:hover{border-color:var(--teal);box-shadow:0 4px 16px rgba(42,191,191,.1)}
.angle-card-top{padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer}
.angle-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.angle-name{font-weight:700;font-size:14px;color:var(--text);flex:1}
.angle-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.angle-card-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s;margin-left:4px}
.angle-card:hover .angle-card-actions{opacity:1}
.angle-card-body{padding:0 18px 16px;display:none}
.angle-card-body.open{display:block}

.pipeline{display:flex;border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:20px}
.pip-btn{flex:1;padding:10px 6px;font-size:10px;font-weight:800;border:none;cursor:pointer;transition:all .15s;text-align:center;letter-spacing:.07em;text-transform:uppercase;border-right:1px solid rgba(0,0,0,.06)}
.pip-btn:last-child{border-right:none}

.brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.brief-grid{grid-template-columns:1fr}}
.brief-field{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px}
.brief-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--subtle);margin-bottom:6px}
.brief-val{font-size:13px;color:#374151;line-height:1.6;white-space:pre-wrap}
.brief-empty{font-size:12px;color:var(--subtle);font-style:italic}
.brief-date{font-size:11px;color:var(--subtle);font-weight:600;margin-bottom:16px;padding:8px 12px;background:var(--cream);border-radius:8px;display:inline-block}

.tasks-list{display:flex;flex-direction:column;gap:8px}
.task-row{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;transition:all .15s}
.task-row:hover{background:var(--surface);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.tcheck{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.tcheck.done{background:var(--teal);border-color:var(--teal);color:#fff}
.tbody{flex:1;min-width:0}
.ttitle{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.ttitle.done{text-decoration:line-through;color:var(--subtle)}
.tmeta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:5px}
.tactions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-row:hover .tactions{opacity:1}
.icon-btn{width:26px;height:26px;border-radius:7px;border:none;background:var(--cream);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:var(--border)}
.icon-btn.del{background:#fee2e2;color:#dc2626}.icon-btn.del:hover{background:#fecaca}

.assignee-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--cream);color:var(--navy)}
.assigned-tag{font-size:10px;color:var(--subtle);font-weight:500}
.due-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(42,191,191,0.12);color:#0e7070}
.due-tag.soon{background:#fef9c3;color:#854d0e}
.due-tag.overdue{background:#fee2e2;color:#dc2626}

.modal-bg{position:fixed;inset:0;background:rgba(27,75,90,.45);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:22px;width:100%;max-width:680px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.mhead{padding:22px 26px 18px;border-bottom:1px solid var(--cream);display:flex;align-items:center;justify-content:space-between}
.mtitle{font-weight:800;font-size:17px;color:var(--text)}
.mclose{width:30px;height:30px;border-radius:8px;border:none;background:var(--cream);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.mclose:hover{background:var(--border)}
.mbody{padding:22px 26px;max-height:68vh;overflow-y:auto}
.mfoot{padding:14px 26px;border-top:1px solid var(--cream);display:flex;gap:8px;justify-content:flex-end}

.frow{margin-bottom:14px}
.flabel{font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;display:block}
.input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;background:#fafaf8;line-height:1.5}
.input:focus{border-color:var(--teal);background:#fff}
textarea.input{resize:vertical;min-height:76px;line-height:1.6}
.stage-sel{display:flex;gap:5px;flex-wrap:wrap}
.sstage{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all .15s}

.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.cpick{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.cpick.selected{border-color:var(--text);transform:scale(1.1)}

.empty{text-align:center;padding:52px 24px;color:var(--subtle)}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-text{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:4px}
.empty-sub{font-size:12px}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.section-desc{font-size:12px;color:var(--subtle);font-weight:500}
.divider{height:1px;background:var(--border);margin:20px 0}

/* brief context banner in task modal */
.brief-ctx{background:#e0f7f7;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#0e7070;line-height:1.5}
.brief-ctx strong{font-weight:700}
</style>
</head>
<body>

<div id="loading">
  <div class="l-logo">Kopari</div>
  <div class="ldot"></div>
</div>

<div id="app" style="display:none">
  <div class="top-bar">
    <div style="display:flex;align-items:center">
      <span class="tb-brand">Kopari</span>
      <span class="tb-sep">|</span>
      <span class="tb-title">Creative Strategy Hub</span>
    </div>
    <div class="sync-wrap">
      <span class="sync-dot" id="syncDot"></span>
      <span class="sync-txt" id="syncTxt">Connecting…</span>
    </div>
  </div>
  <div class="page" id="mainPage"></div>
</div>

<script>
const STAGES=["Strategy","Brief","Assigned","In Production","Live"];
const SC={
  "Strategy":      {bg:"#e0f7f7",color:"#0e7070"},
  "Brief":         {bg:"#ede9fe",color:"#5b21b6"},
  "Assigned":      {bg:"#fef9c3",color:"#854d0e"},
  "In Production": {bg:"#F9D9E7",color:"#9d174d"},
  "Live":          {bg:"#dcfce7",color:"#166534"}
};
const ANGLE_COLORS=["#2ABFBF","#1B4B5A","#FF3EBF","#C8E000","#F5E642","#6B4A0B","#F9D9E7","#a78bfa","#fb923c","#34d399"];
const STRATEGY_QS=[
  {id:"main_thing",    label:"What does this product do that nothing else does?",          cat:"main",       catLabel:"Main Thing"},
  {id:"emotional",     label:"What's the emotional payoff, not just the functional one?",  cat:"main",       catLabel:"Main Thing"},
  {id:"one_thing",     label:"If customers only remember ONE thing, what is it?",          cat:"main",       catLabel:"Main Thing"},
  {id:"pain_point",    label:"What's the biggest pain point this product solves?",         cat:"awareness",  catLabel:"Awareness"},
  {id:"value",         label:"What's the biggest value this product provides?",            cat:"awareness",  catLabel:"Awareness"},
  {id:"stop_scroll",   label:"What would make someone stop scrolling?",                    cat:"hook",       catLabel:"Hook"},
  {id:"objections",    label:"What objections might customers have that we can answer?",   cat:"conversion", catLabel:"Conversion"},
  {id:"differentiator",label:"How is this different from competitors?",                    cat:"conversion", catLabel:"Conversion"},
];

let state={products:{}};
let view={type:"overview"};
let _db,_ref,_set,_on,saveTimer,listening=false;
let detailTab="strategy";
let openAngles={};

function initFB(){
  _db=window.__fbDb;_ref=window.__fbRef;_set=window.__fbSet;_on=window.__fbOn;
  if(listening)return;listening=true;
  _on(_ref(_db,"kopari_strategy"),snap=>{
    const val=snap.val();
    if(val?.products)state.products=val.products;
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    render();
    setSyncStatus("live");
  });
}

function save(){
  setSyncStatus("saving");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    _set(_ref(_db,"kopari_strategy"),state);
    setTimeout(()=>setSyncStatus("live"),600);
  },500);
}

function setSyncStatus(s){
  const dot=document.getElementById("syncDot");
  const txt=document.getElementById("syncTxt");
  if(!dot||!txt)return;
  if(s==="live"){dot.style.background="#6ee7b7";txt.textContent="Live ✓";}
  else if(s==="saving"){dot.style.background="#f59e0b";txt.textContent="Saving…";}
  else{dot.style.background="#f59e0b";txt.textContent="Connecting…";}
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function h(tag,attrs={},...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="class")el.className=v;
    else if(k.startsWith("on"))el[k]=v;
    else el.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{if(c==null)return;el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return el;
}
function css(el,s){Object.assign(el.style,s);return el;}
function sc(s){return SC[s]||SC["Strategy"];}

function fmtDate(ts){
  if(!ts)return"";
  return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function dueCls(dateStr){
  if(!dateStr)return"";
  const due=new Date(dateStr+"T00:00:00");
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((due-today)/86400000);
  if(diff<0)return"overdue";
  if(diff<=3)return"soon";
  return"";
}

function render(){
  const page=document.getElementById("mainPage");
  const sy=window.scrollY;
  page.innerHTML="";
  if(view.type==="overview")page.appendChild(buildOverview());
  else if(view.type==="product"){
    const p=state.products[view.id];
    if(p)page.appendChild(buildProductDetail(view.id,p));
    else{view={type:"overview"};page.appendChild(buildOverview());}
  }
  window.scrollTo(0,sy);
}

function buildBreadcrumb(items){
  const bc=h("div",{class:"breadcrumb"});
  items.forEach((item,i)=>{
    const el=h("span",{class:"bc-item"+(i===items.length-1?" active":"")},item.label);
    if(item.onClick)el.onclick=item.onClick;
    bc.appendChild(el);
    if(i<items.length-1)bc.appendChild(h("span",{class:"bc-sep"},"›"));
  });
  return bc;
}

function buildOverview(){
  const frag=document.createDocumentFragment();
  const prods=Object.entries(state.products);

  const hdr=h("div",{class:"page-header"});
  const tb=h("div");
  tb.appendChild(h("div",{class:"page-title"},"Creative Strategy"));
  tb.appendChild(h("div",{class:"page-sub"},"Products → Strategy → Angles → Brief + Tasks"));
  hdr.appendChild(tb);
  hdr.appendChild(h("button",{class:"btn btn-navy",onclick:()=>openProductModal()},"+ New Product"));
  frag.appendChild(hdr);

  const stats=h("div",{class:"stats-row"});
  const totalAngles=prods.reduce((n,[,p])=>n+Object.keys(p.angles||{}).length,0);
  const liveAngles=prods.reduce((n,[,p])=>n+Object.values(p.angles||{}).filter(a=>a.stage==="Live").length,0);
  const inProd=prods.reduce((n,[,p])=>n+Object.values(p.angles||{}).filter(a=>a.stage==="In Production").length,0);
  [["Products",prods.length,""],["Total Angles",totalAngles,""],["In Production",inProd,"highlight"],["Live",liveAngles,""]].forEach(([label,n,cls])=>{
    const c=h("div",{class:"stat"+(cls?" "+cls:"")});
    c.appendChild(h("div",{class:"stat-num"},String(n)));
    c.appendChild(h("div",{class:"stat-label"},label));
    stats.appendChild(c);
  });
  frag.appendChild(stats);

  const filterRow=h("div",{class:"filter-row"});
  const ftabs=h("div",{class:"filter-tabs"});
  const grid=h("div",{class:"products-grid"});

  function applyFilter(f){
    ftabs.querySelectorAll(".ftab").forEach(t=>t.classList.remove("active"));
    ftabs.querySelector(`[data-f="${f}"]`).classList.add("active");
    grid.innerHTML="";
    let filtered=prods;
    if(f!=="All")filtered=prods.filter(([,p])=>Object.values(p.angles||{}).some(a=>a.stage===f));
    if(!filtered.length){
      grid.appendChild(css(h("div",{class:"empty",style:"grid-column:1/-1"},h("div",{class:"empty-icon"},"✦"),h("div",{class:"empty-text"},f==="All"?"No products yet":"None in "+f)),{}));
    }else{filtered.forEach(([id,p])=>grid.appendChild(buildPcard(id,p)));}
  }

  ["All",...STAGES].forEach(f=>{
    const t=h("button",{class:"ftab"+(f==="All"?" active":"")},f);
    t.dataset.f=f;t.onclick=()=>applyFilter(f);ftabs.appendChild(t);
  });
  filterRow.appendChild(ftabs);frag.appendChild(filterRow);
  applyFilter("All");frag.appendChild(grid);
  return frag;
}

  body.appendChild(css(h("div",{class:"pcard-preview"},preview||"No strategy notes yet"),{color:preview?"":"var(--subtle)",fontStyle:preview?"":"italic"}));

function buildAngleCard(pid,p,aid,angle){
  const isOpen=!!openAngles[aid];
  const cfg=sc(angle.stage||"Strategy");

  const done=tasks.filter(t=>t.done).length;
  const card=h("div",{class:"angle-card"});

  const top=h("div",{class:"angle-card-top",onclick:()=>{openAngles[aid]=!openAngles[aid];render();}});
  top.appendChild(css(h("div",{class:"angle-color-dot"}),{background:angle.color||"var(--teal)"}));
  top.appendChild(h("div",{class:"angle-name"},angle.name||"Untitled Angle"));
  const meta=h("div",{class:"angle-meta"});
  meta.appendChild(css(h("span",{class:"stage-pill"},angle.stage||"Strategy"),{background:cfg.bg,color:cfg.color}));
  if(tasks.length)meta.appendChild(css(h("span",{},`${done}/${tasks.length} tasks`),{fontSize:"11px",color:"var(--subtle)",fontWeight:"500"}));
  top.appendChild(meta);
  const acts=h("div",{class:"angle-card-actions"});
  acts.appendChild(h("button",{class:"icon-btn",onclick:e=>{e.stopPropagation();openAngleModal(pid,p,aid,angle);}},"✎"));
  acts.appendChild(h("button",{class:"icon-btn del",onclick:e=>{e.stopPropagation();if(confirm("Delete angle?")){delete state.products[pid].angles[aid];save();render();}}},"✕"));
  top.appendChild(acts);
  top.appendChild(css(h("span",{},isOpen?"▲":"▼"),{fontSize:"11px",color:"var(--subtle)",marginLeft:"4px",flexShrink:"0"}));
  card.appendChild(top);

  const body=h("div",{class:"angle-card-body"+(isOpen?" open":"")});
  if(angle.sourceQuestion){
    const sq=STRATEGY_QS.find(q=>q.id===angle.sourceQuestion);
    const srcNote=css(h("div",{}),{background:"var(--cream)",borderRadius:"10px",padding:"10px 14px",marginBottom:"16px",fontSize:"12px",color:"var(--muted)"});
    srcNote.appendChild(css(h("span",{},"Branched from: "),{fontWeight:"700",color:"var(--navy)"}));
    srcNote.appendChild(document.createTextNode(sq?.label||angle.sourceQuestion));
    if(angle.sourceAnswer)srcNote.appendChild(css(h("div",{},`"${angle.sourceAnswer}"`),{marginTop:"4px",fontStyle:"italic",color:"var(--text)"}));
    body.appendChild(srcNote);
  }

  const pipeline=h("div",{class:"pipeline"});
  const curIdx=STAGES.indexOf(angle.stage||"Strategy");
  STAGES.forEach((s,i)=>{

    pipeline.appendChild(css(h("button",{class:"pip-btn",onclick:e=>{e.stopPropagation();state.products[pid].angles[aid].stage=s;save();render();}},s),{
      background:isActive?"var(--navy)":isDone?c2.bg:"var(--bg)",
      color:isActive?"#fff":isDone?c2.color:"var(--subtle)",
    }));
  });
  body.appendChild(pipeline);

  const btabs=h("div",{class:"itabs",style:"margin-bottom:16px"});
  let activeTab=angle._openTab||"brief";
  const bcontent=h("div");
  function showBT(t){
    angle._openTab=t;
    btabs.querySelectorAll(".itab").forEach((b,i)=>b.classList.toggle("active",["brief","tasks"][i]===t));
    bcontent.innerHTML="";
    if(t==="brief")bcontent.appendChild(buildAngleBrief(pid,aid,angle));
    if(t==="tasks")bcontent.appendChild(buildAngleTasks(pid,aid,angle));
  }
  btabs.appendChild(h("button",{class:"itab"+(activeTab==="brief"?" active":""),onclick:()=>showBT("brief")},"📄 Brief"));
  btabs.appendChild(h("button",{class:"itab"+(activeTab==="tasks"?" active":""),onclick:()=>showBT("tasks")},"✅ Tasks"+(tasks.length?" ("+tasks.length+")":"")));
  body.appendChild(btabs);showBT(activeTab);body.appendChild(bcontent);

    if(!state.products[pid].angles[aid].tasks)state.products[pid].angles[aid].tasks=[];
    if(isEdit)state.products[pid].angles[aid].tasks[idx]=task;
    else state.products[pid].angles[aid].tasks.push(task);
    save();render();bg.remove();
  }},isEdit?"Save Task":"Add Task"));
  modal.appendChild(mf);bg.appendChild(modal);document.body.appendChild(bg);
  setTimeout(()=>ti.focus(),50);
}

function mkBg(){
  const bg=h("div",{class:"modal-bg"});
  bg.onclick=e=>{if(e.target===bg)bg.remove();};return bg;
}
function mkHead(title,onClose){
  const mh=h("div",{class:"mhead"});
  mh.appendChild(h("div",{class:"mtitle"},title));
  mh.appendChild(h("button",{class:"mclose",onclick:onClose},"×"));
  return mh;
}

if(window.__fbReady)initFB();
else document.addEventListener("fb-ready",initFB);
</script>
