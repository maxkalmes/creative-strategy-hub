<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kopari Creative Strategy</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  const firebaseConfig = {
    apiKey:"AIzaSyDgsDI8pORzW498xSQRKpx_y5t0vP21rpU",
    authDomain:"kopari-tracker.firebaseapp.com",
    databaseURL:"https://kopari-tracker-default-rtdb.firebaseio.com",
    projectId:"kopari-tracker",
    storageBucket:"kopari-tracker.firebasestorage.app",
    messagingSenderId:"242410831408",
    appId:"1:242410831408:web:ff3f73855b000d4d5db7f5"
  };
  const app=initializeApp(firebaseConfig);
  const db=getDatabase(app);
  window.__fbDb=db;window.__fbRef=ref;window.__fbSet=set;window.__fbOn=onValue;
  window.__fbReady=true;
  document.dispatchEvent(new Event("fb-ready"));
</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f5f2;color:#1a1a1a;min-height:100vh}
button,input,textarea,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d1c9c0;border-radius:4px}

#loading{position:fixed;inset:0;background:#f7f5f2;display:flex;align-items:center;justify-content:center;z-index:9999}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.ldot{width:10px;height:10px;border-radius:50%;background:#e8c4b8;display:inline-block;animation:pulse 1.2s ease-in-out infinite}

.topbar{background:#1a1a1a;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.2em;color:#e8c4b8;text-transform:uppercase}
.top-title{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:#fff;letter-spacing:.03em;margin-left:12px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;display:inline-block;margin-right:5px}
.sync-txt{font-size:11px;color:#9ca3af}

.page{padding:32px;max-width:1560px;margin:0 auto}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#1a1a1a;letter-spacing:-.3px}
.page-sub{font-size:12px;color:#a89f94;margin-top:5px}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-dark{background:#1a1a1a;color:#fff}.btn-dark:hover{background:#2d2d2d}
.btn-ghost{background:transparent;color:#6b7280;border:1.5px solid #e5e1dd}.btn-ghost:hover{background:#f7f5f2}
.btn-danger{background:#fee2e2;color:#dc2626}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px;font-weight:700}

/* STATS */
.stats-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #ede8e3;border-radius:14px;padding:13px 18px;flex:1;min-width:90px}
.stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
.stat-label{font-size:11px;color:#a89f94;font-weight:500;margin-top:2px}

/* FILTER */
.ftabs{display:flex;gap:4px;margin-bottom:22px;flex-wrap:wrap}
.ftab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;border:1.5px solid transparent;background:#fff;transition:all .15s}
.ftab:hover{background:#f0ece8}
.ftab.active{background:#1a1a1a;color:#fff}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.pcard{background:#fff;border-radius:18px;border:1px solid #ede8e3;overflow:hidden;cursor:pointer;transition:all .2s}
.pcard:hover{box-shadow:0 6px 24px rgba(0,0,0,.08);transform:translateY(-1px)}
.pcard-top{padding:16px 18px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pcard-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#1a1a1a}
.pcard-body{padding:0 18px 16px}
.pcard-angles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:24px}
.angle-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;color:#fff}
.pcard-footer{display:flex;align-items:center;justify-content:space-between}
.pcard-btns{display:flex;gap:5px;opacity:0;transition:opacity .15s}
.pcard:hover .pcard-btns{opacity:1}

/* STAGE PILL */
.spill{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}

/* DETAIL */
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.back-btn{padding:7px 14px;border-radius:9px;border:1px solid #e5e1dd;background:#fff;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer}
.back-btn:hover{background:#f7f5f2}
.detail-name{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:#1a1a1a;flex:1}

/* INNER TABS */
.itabs{display:flex;gap:4px;margin-bottom:24px;background:#f0ece8;border-radius:11px;padding:4px;width:fit-content}
.itab{padding:7px 18px;border-radius:8px;font-size:12px;font-weight:600;color:#7a7069;cursor:pointer;border:none;background:transparent;transition:all .15s}
.itab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,.09)}

/* STRATEGY TAB */
.sq-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.sq-grid{grid-column:1fr}}
.sq-card{background:#faf8f5;border:1px solid #ede8e3;border-radius:14px;padding:16px}
.sq-cat{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.05em;margin-bottom:8px}
.cat-main{background:#fce7f3;color:#be185d}
.cat-awareness{background:#ede9fe;color:#6d28d9}
.cat-hook{background:#dcfce7;color:#166534}
.cat-conversion{background:#fef3c7;color:#92400e}
.sq-q{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px;line-height:1.5}

/* ANSWERS */
.answers-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.answer-row{display:flex;align-items:flex-start;gap:7px}
.answer-ta{flex:1;padding:8px 10px;border:1.5px solid #e5e1dd;border-radius:9px;font-size:12px;color:#1a1a1a;background:#fff;outline:none;resize:none;line-height:1.5;min-height:54px;transition:border-color .15s}
.answer-ta:focus{border-color:#1a1a1a}
.answer-actions{display:flex;flex-direction:column;gap:3px;padding-top:2px}
.branch-btn{padding:3px 7px;border-radius:6px;font-size:10px;font-weight:700;border:1.5px solid #e5e1dd;background:#fff;color:#6b7280;cursor:pointer;white-space:nowrap;transition:all .15s}
.branch-btn:hover{background:#f0ece8;border-color:#c4b8af}
.del-answer{width:22px;height:22px;border-radius:5px;border:none;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.add-answer-btn{padding:5px 10px;border-radius:8px;border:1.5px dashed #d4ccc5;background:transparent;color:#a89f94;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.add-answer-btn:hover{border-color:#a89f94;color:#6b7280;background:#f7f5f2}

/* ANGLES TAB */
.angles-list{display:flex;flex-direction:column;gap:12px}
.angle-card{background:#fff;border-radius:16px;border:1px solid #ede8e3;overflow:hidden;transition:box-shadow .2s}
.angle-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.angle-card-top{padding:14px 16px 10px;display:flex;align-items:center;gap:10px}
.angle-color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.angle-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#1a1a1a;flex:1}
.angle-source{font-size:11px;color:#a89f94;padding:0 16px 8px;font-style:italic;line-height:1.5}
.angle-pipeline{display:flex;border-top:1px solid #f5f0eb}
.angle-pip-btn{flex:1;padding:8px 4px;font-size:10px;font-weight:700;border:none;cursor:pointer;transition:all .15s;text-align:center;letter-spacing:.04em;text-transform:uppercase;border-right:1px solid #f5f0eb}
.angle-pip-btn:last-child{border-right:none}
.angle-card-body{padding:12px 16px;border-top:1px solid #f5f0eb}
.angle-section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a89f94;margin-bottom:8px}

/* BRIEF fields inside angle */
.brief-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:600px){.brief-grid{grid-template-columns:1fr}}
.brief-field{background:#faf8f5;border:1px solid #ede8e3;border-radius:10px;padding:11px}
.brief-flabel{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#a89f94;margin-bottom:5px}
.brief-fval{font-size:12px;color:#374151;line-height:1.5;white-space:pre-wrap}
.brief-fempty{font-size:11px;color:#c4b8af;font-style:italic}

/* TASKS inside angle */
.tasks-list{display:flex;flex-direction:column;gap:7px}
.task-row{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;background:#faf8f5;border-radius:10px;border:1px solid #ede8e3}
.tcheck{width:18px;height:18px;border-radius:5px;border:2px solid #d4ccc5;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.tcheck.done{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.ttitle{font-size:12px;font-weight:600;color:#1a1a1a}
.ttitle.done{text-decoration:line-through;color:#a89f94}
.tmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
.task-row:hover .tact{opacity:1}
.tact{opacity:0;display:flex;gap:3px;transition:opacity .15s;flex-shrink:0}
.iBtn{width:22px;height:22px;border-radius:5px;border:none;background:#f0ece8;color:#6b7280;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.iBtn:hover{background:#e8e2dc}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,26,26,.5);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:22px;width:100%;max-width:680px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.mhead{padding:20px 24px 16px;border-bottom:1px solid #f0ece8;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#1a1a1a}
.mclose{width:28px;height:28px;border-radius:7px;border:none;background:#f0ece8;color:#7a7069;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:#e8e2dc}
.mbody{padding:20px 24px;max-height:70vh;overflow-y:auto}
.mfoot{padding:14px 24px;border-top:1px solid #f0ece8;display:flex;gap:8px;justify-content:flex-end}
.frow{margin-bottom:14px}
.label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;display:block}
.input{width:100%;padding:9px 12px;border:1.5px solid #e5e1dd;border-radius:10px;font-size:13px;color:#1a1a1a;outline:none;transition:border-color .15s;background:#fafaf9}
.input:focus{border-color:#1a1a1a;background:#fff}
textarea.input{resize:vertical;min-height:72px;line-height:1.6}
.stage-sel{display:flex;gap:5px;flex-wrap:wrap}
.sstage{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid #e5e1dd;background:#fff;color:#6b7280;cursor:pointer;transition:all .15s}

/* COLOR PICKER */
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.cpick{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.cpick.selected{border-color:#1a1a1a;transform:scale(1.15)}

/* SOURCE PICKER */
.source-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.source-item{padding:10px 12px;border:1.5px solid #e5e1dd;border-radius:10px;cursor:pointer;transition:all .15s}
.source-item:hover{border-color:#a89f94;background:#faf8f5}
.source-item.selected{border-color:#1a1a1a;background:#f7f5f2}
.source-q{font-size:11px;font-weight:700;color:#6b7280;margin-bottom:3px}
.source-a{font-size:13px;color:#1a1a1a;line-height:1.4}

.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-desc{font-size:12px;color:#a89f94}
.empty{text-align:center;padding:40px 24px;color:#a89f94}
.empty-icon{font-size:30px;margin-bottom:10px}
.empty-text{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:3px}
.empty-sub{font-size:11px}
.divider{height:1px;background:#f0ece8;margin:16px 0}
</style>
</head>
<body>
<div id="loading"><div><div class="ldot"></div></div></div>
<div id="app" style="display:none">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <span class="brand">Kopari</span>
      <span class="top-title">· Creative Strategy Hub</span>
    </div>
    <div>
      <span class="sync-dot" id="syncDot"></span>
      <span class="sync-txt" id="syncTxt">Connecting…</span>
    </div>
  </div>
  <div class="page" id="mainPage"></div>
</div>

<script>
// ══ CONSTANTS ══
const STAGES=["Strategy","Brief","Assigned","In Production","Live"];
const SC={
  "Strategy":      {bg:"#fef3c7",color:"#92400e"},
  "Brief":         {bg:"#dbeafe",color:"#1d4ed8"},
  "Assigned":      {bg:"#ede9fe",color:"#6d28d9"},
  "In Production": {bg:"#fce7f3",color:"#be185d"},
  "Live":          {bg:"#dcfce7",color:"#166534"}
};
const ANGLE_COLORS=["#06b6d4","#0f4c6e","#ec4899","#84cc16","#eab308","#78350f","#f9a8d4","#a78bfa","#f97316","#10b981"];
const STRATEGY_QS=[
  {id:"main_thing",    label:"What does this product do that nothing else does?",         cat:"main",       catLabel:"Main Thing"},
  {id:"emotional",     label:"What's the emotional payoff, not just the functional one?",  cat:"main",       catLabel:"Main Thing"},
  {id:"one_thing",     label:"If customers only remember ONE thing, what is it?",          cat:"main",       catLabel:"Main Thing"},
  {id:"pain_point",    label:"What's the biggest pain point this product solves?",         cat:"awareness",  catLabel:"Awareness"},
  {id:"value",         label:"What's the biggest value this product provides?",            cat:"awareness",  catLabel:"Awareness"},
  {id:"stop_scroll",   label:"What would make someone stop scrolling?",                    cat:"hook",       catLabel:"Hook"},
  {id:"objections",    label:"What objections might customers have that we can answer?",   cat:"conversion", catLabel:"Conversion"},
  {id:"differentiator",label:"How is this different from competitors?",                    cat:"conversion", catLabel:"Conversion"},
];
const BRIEF_FIELDS=[
  {key:"objective",  label:"Campaign Objective", ph:"What's the goal of this content?"},
  {key:"audience",   label:"Target Audience",    ph:"Who are we speaking to?"},
  {key:"formats",    label:"Content Formats",    ph:"UGC, talking head, GRWM, demo…"},
  {key:"hooks",      label:"Hook Ideas",         ph:"Opening lines or visual hooks to test"},
  {key:"dos",        label:"Do's",               ph:"Things creators should do"},
  {key:"donts",      label:"Don'ts",             ph:"Things to avoid"},
  {key:"references", label:"References / Inspo", ph:"Links or descriptions"},
  {key:"deadline",   label:"Deadline",           ph:"e.g. March 20, 2026"},
];

// ══ STATE ══
let state={products:{}};
let view="overview"; // "overview" | productId
let detailTab="strategy";
let _db,_ref,_set,_on,saveTimer,listening=false;

// ══ FIREBASE ══
function initFB(){
  _db=window.__fbDb;_ref=window.__fbRef;_set=window.__fbSet;_on=window.__fbOn;
  if(listening)return;listening=true;
  _on(_ref(_db,"kopari_strategy"),snap=>{
    const val=snap.val();
    if(val?.products) state.products=val.products;
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    render();
    document.getElementById("syncDot").style.background="#6ee7b7";
    document.getElementById("syncTxt").textContent="Live ✓";
  });
}
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>_set(_ref(_db,"kopari_strategy"),state),700);}

// ══ HELPERS ══
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function h(tag,attrs={},...kids){
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k.startsWith("on"))el[k]=v;
    else if(k==="class")el.className=v;
    else el.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{if(c==null)return;el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return el;
}
function css(el,s){Object.assign(el.style,s);return el;}
function getAnswersFlat(product){
  // Returns [{qId, qLabel, answerId, text}] for all non-empty answers
  const out=[];
  STRATEGY_QS.forEach(q=>{
    const answers=product.strategy?.[q.id]||[];
    answers.forEach(a=>{if(a.text?.trim()) out.push({qId:q.id,qLabel:q.label,answerId:a.id,text:a.text});});
  });
  return out;
}

// ══ RENDER ══
function render(){
  const page=document.getElementById("mainPage");
  const sy=window.scrollY;
  page.innerHTML="";
  if(view==="overview") page.appendChild(buildOverview());
  else{
    const p=state.products[view];
    if(p) page.appendChild(buildDetail(view,p));
    else{view="overview";page.appendChild(buildOverview());}
  }
  window.scrollTo(0,sy);
}

// ══ OVERVIEW ══
function buildOverview(){
  const frag=document.createDocumentFragment();
  const prods=Object.entries(state.products);

  const hdr=h("div",{class:"page-header"});
  const tb=h("div");
  tb.appendChild(h("div",{class:"page-title"},"Creative Strategy"));
  tb.appendChild(h("div",{class:"page-sub"},"Product → Strategy Answers → Angles → Brief → Tasks"));
  hdr.appendChild(tb);
  hdr.appendChild(h("button",{class:"btn btn-dark",onclick:()=>openProductModal()},"+ New Product"));
  frag.appendChild(hdr);

  // Stats
  const sr=h("div",{class:"stats-row"});
  const stageCounts={};STAGES.forEach(s=>stageCounts[s]=0);
  let totalAngles=0;
  prods.forEach(([,p])=>{
    const angles=Object.values(p.angles||{});
    totalAngles+=angles.length;
    angles.forEach(a=>{if(stageCounts[a.stage]!==undefined)stageCounts[a.stage]++;});
  });
  sr.appendChild(mkStat(prods.length,"Products"));
  sr.appendChild(mkStat(totalAngles,"Total Angles"));
  STAGES.forEach(s=>sr.appendChild(mkStat(stageCounts[s],s)));
  frag.appendChild(sr);

  // Filter
  let activeF="All";
  const ftabs=h("div",{class:"ftabs"});
  const grid=h("div",{class:"pgrid"});
  function applyF(f){
    activeF=f;
    ftabs.querySelectorAll(".ftab").forEach(t=>t.classList.remove("active"));
    ftabs.querySelectorAll(".ftab")[["All",...STAGES].indexOf(f)].classList.add("active");
    grid.innerHTML="";
    let filtered=prods;
    if(f!=="All") filtered=prods.filter(([,p])=>Object.values(p.angles||{}).some(a=>a.stage===f));
    if(!filtered.length){
      const e=h("div",{class:"empty",style:"grid-column:1/-1"});
      e.appendChild(h("div",{class:"empty-icon"},"✦"));
      e.appendChild(h("div",{class:"empty-text"},f==="All"?"No products yet":"No angles in "+f));
      grid.appendChild(e);
    } else filtered.forEach(([id,p])=>grid.appendChild(buildPcard(id,p)));
  }
  ["All",...STAGES].forEach((f,i)=>{
    ftabs.appendChild(h("button",{class:"ftab"+(i===0?" active":""),onclick:()=>applyF(f)},f));
  });
  frag.appendChild(ftabs);
  applyF("All");
  frag.appendChild(grid);
  return frag;
}
function mkStat(n,label){
  const c=h("div",{class:"stat"});
  c.appendChild(h("div",{class:"stat-num"},String(n)));
  c.appendChild(h("div",{class:"stat-label"},label));
  return c;
}
function buildPcard(id,p){
  const card=h("div",{class:"pcard",onclick:()=>{view=id;detailTab="strategy";render();}});
  const top=h("div",{class:"pcard-top"});
  top.appendChild(h("div",{class:"pcard-name"},p.name||"Untitled"));
  const pbtns=h("div",{class:"pcard-btns"});
  pbtns.appendChild(h("button",{class:"btn btn-ghost btn-sm",onclick:e=>{e.stopPropagation();openProductModal(id,p);}},"Edit"));
  pbtns.appendChild(h("button",{class:"btn btn-danger btn-sm",onclick:e=>{e.stopPropagation();if(confirm("Delete "+p.name+"?")){delete state.products[id];save();render();}}},"✕"));
  top.appendChild(pbtns);
  card.appendChild(top);

  const body=h("div",{class:"pcard-body"});
  const angles=Object.values(p.angles||{});
  const chips=h("div",{class:"pcard-angles"});
  if(angles.length){
    angles.slice(0,4).forEach(a=>{
      const sc=SC[a.stage||"Strategy"];
      const chip=css(h("div",{class:"angle-chip"},a.name),{background:a.color||"#6b7280"});
      chips.appendChild(chip);
    });
    if(angles.length>4) chips.appendChild(css(h("div",{},`+${angles.length-4} more`),{fontSize:"10px",color:"#a89f94",alignSelf:"center"}));
  } else {
    chips.appendChild(css(h("div",{},"No angles yet"),{fontSize:"11px",color:"#c4b8af",fontStyle:"italic"}));
  }
  body.appendChild(chips);
  const footer=h("div",{class:"pcard-footer"});
  footer.appendChild(css(h("div",{},angles.length+" angle"+(angles.length!==1?"s":"")),{fontSize:"11px",color:"#a89f94"}));
  body.appendChild(footer);
  card.appendChild(body);
  return card;
}

// ══ PRODUCT DETAIL ══
function buildDetail(id,p){
  const frag=document.createDocumentFragment();
  const hdr=h("div",{class:"detail-header"});
  hdr.appendChild(h("button",{class:"back-btn",onclick:()=>{view="overview";render();}},"← Products"));
  hdr.appendChild(h("div",{class:"detail-name"},p.name));
  const angles=Object.values(p.angles||{});
  css(h("div",{},angles.length+" angle"+(angles.length!==1?"s":"")),{fontSize:"12px",color:"#a89f94"});
  frag.appendChild(hdr);

  const itabs=h("div",{class:"itabs"});
  const content=h("div");
  const tabs=[
    {id:"strategy",label:"📋 Strategy"},
    {id:"angles",  label:`🎯 Angles (${angles.length})`},
  ];
  function showTab(sid){
    detailTab=sid;
    itabs.querySelectorAll(".itab").forEach((t,i)=>t.classList.toggle("active",tabs[i].id===sid));
    content.innerHTML="";
    if(sid==="strategy") content.appendChild(buildStrategyTab(id,p));
    if(sid==="angles")   content.appendChild(buildAnglesTab(id,p));
  }
  tabs.forEach(t=>itabs.appendChild(h("button",{class:"itab"+(t.id===detailTab?" active":""),onclick:()=>showTab(t.id)},t.label)));
  frag.appendChild(itabs);
  frag.appendChild(content);
  // Must append to frag first so DOM queries work, then show tab
  setTimeout(()=>showTab(detailTab),0);
  return frag;
}

// ── STRATEGY TAB ──
function buildStrategyTab(id,p){
  const wrap=h("div");
  wrap.appendChild(css(h("div",{},"Answer as many questions as you like — each answer can branch into its own angle."),{fontSize:"12px",color:"#a89f94",marginBottom:"18px"}));
  const grid=h("div",{class:"sq-grid"});
  const catCls={main:"cat-main",awareness:"cat-awareness",hook:"cat-hook",conversion:"cat-conversion"};
  STRATEGY_QS.forEach(q=>{
    const card=h("div",{class:"sq-card"});
    card.appendChild(h("span",{class:"sq-cat "+catCls[q.cat]},q.catLabel));
    card.appendChild(h("div",{class:"sq-q"},q.label));
    if(!p.strategy) p.strategy={};
    if(!p.strategy[q.id]) p.strategy[q.id]=[];

    function renderAnswers(){
      aList.innerHTML="";
      (p.strategy[q.id]||[]).forEach((ans,ai)=>{
        const row=h("div",{class:"answer-row"});
        const ta=h("textarea",{class:"answer-ta",placeholder:"Type an answer…"});
        ta.value=ans.text||"";
        ta.oninput=e=>{
          state.products[id].strategy[q.id][ai].text=e.target.value;
          save();
        };
        // Auto-resize
        ta.addEventListener("input",()=>{ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";});
        setTimeout(()=>{ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";},0);
        row.appendChild(ta);
        const acts=h("div",{class:"answer-actions"});
        const bb=h("button",{class:"branch-btn",onclick:()=>openAngleModal(id,p,{qId:q.id,answerId:ans.id,answerText:ans.text})},"⤷ Branch");
        acts.appendChild(bb);
        const db=css(h("button",{class:"del-answer",onclick:()=>{
          state.products[id].strategy[q.id].splice(ai,1);
          save();renderAnswers();
        }},"×"),{});
        acts.appendChild(db);
        row.appendChild(acts);
        aList.appendChild(row);
      });
    }

    const aList=h("div",{class:"answers-list"});
    renderAnswers();
    card.appendChild(aList);

    const addBtn=h("button",{class:"add-answer-btn",onclick:()=>{
      if(!state.products[id].strategy[q.id]) state.products[id].strategy[q.id]=[];
      state.products[id].strategy[q.id].push({id:genId(),text:""});
      save();renderAnswers();
      setTimeout(()=>{ const tas=aList.querySelectorAll(".answer-ta"); if(tas.length) tas[tas.length-1].focus(); },50);
    }},"+ Add answer");
    card.appendChild(addBtn);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  return wrap;
}

// ── ANGLES TAB ──
function buildAnglesTab(id,p){
  const wrap=h("div");
  const shdr=h("div",{class:"section-hdr"});
  shdr.appendChild(h("div",{class:"section-desc"},"Each angle has its own stage, brief, and tasks."));
  shdr.appendChild(h("button",{class:"btn btn-dark btn-sm",onclick:()=>openAngleModal(id,p,null)},"+ New Angle"));
  wrap.appendChild(shdr);

  const angles=Object.entries(p.angles||{});
  if(!angles.length){
    const e=h("div",{class:"empty"});
    e.appendChild(h("div",{class:"empty-icon"},"🎯"));
    e.appendChild(h("div",{class:"empty-text"},"No angles yet"));
    e.appendChild(h("div",{class:"empty-sub"},'Branch from a strategy answer or click "+ New Angle"'));
    wrap.appendChild(e);
    return wrap;
  }

  const list=h("div",{class:"angles-list"});
  angles.forEach(([aid,angle])=>list.appendChild(buildAngleCard(id,p,aid,angle)));
  wrap.appendChild(list);
  return wrap;
}

function buildAngleCard(pid,p,aid,angle){
  const card=h("div",{class:"angle-card"});
  const sc=SC[angle.stage||"Strategy"];

  // Top row
  const top=h("div",{class:"angle-card-top"});
  top.appendChild(css(h("div",{class:"angle-color-dot"}),{background:angle.color||"#6b7280"}));
  top.appendChild(h("div",{class:"angle-name"},angle.name));
  top.appendChild(css(h("div",{class:"spill"},angle.stage||"Strategy"),{background:sc.bg,color:sc.color}));
  const topBtns=h("div",{style:"display:flex;gap:4px"});
  topBtns.appendChild(h("button",{class:"btn btn-ghost btn-xs",onclick:()=>openAngleModal(pid,p,null,aid,angle)},"Edit"));
  topBtns.appendChild(h("button",{class:"btn btn-danger btn-xs",onclick:()=>{if(confirm("Delete this angle?")){delete state.products[pid].angles[aid];save();render();}}},"✕"));
  top.appendChild(topBtns);
  card.appendChild(top);

  // Source answer
  if(angle.sourceAnswerText){
    card.appendChild(css(h("div",{class:"angle-source"},`Branched from: "${angle.sourceAnswerText}"`),{}));
  }

  // Pipeline
  const pipeline=h("div",{class:"angle-pipeline"});
  const curIdx=STAGES.indexOf(angle.stage||"Strategy");
  STAGES.forEach((s,i)=>{
    const sc2=SC[s];
    const isA=i===curIdx,isDone=i<curIdx;
    const btn=css(h("button",{class:"angle-pip-btn",onclick:()=>{state.products[pid].angles[aid].stage=s;save();render();}},s),{
      background:isA?"#1a1a1a":isDone?sc2.bg:"#f7f5f2",
      color:isA?"#fff":isDone?sc2.color:"#c4b8af",
    });
    pipeline.appendChild(btn);
  });
  card.appendChild(pipeline);

  // Expandable body — brief + tasks
  let expanded=false;
  const body=h("div",{class:"angle-card-body",style:"display:none"});

  // Brief section
  const briefHdr=h("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"});
  briefHdr.appendChild(h("div",{class:"angle-section-title"},"Brief"));
  briefHdr.appendChild(h("button",{class:"btn btn-ghost btn-xs",onclick:()=>openBriefModal(pid,aid,angle)},"Edit"));
  body.appendChild(briefHdr);
  const brief=angle.brief||{};
  const bgrid=h("div",{class:"brief-grid"});
  BRIEF_FIELDS.forEach(f=>{
    const fc=h("div",{class:"brief-field"});
    fc.appendChild(h("div",{class:"brief-flabel"},f.label));
    fc.appendChild(brief[f.key]?h("div",{class:"brief-fval"},brief[f.key]):h("div",{class:"brief-fempty"},"—"));
    bgrid.appendChild(fc);
  });
  body.appendChild(bgrid);
  body.appendChild(h("div",{class:"divider"}));

  // Tasks section
  const tasksHdr=h("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"});
  const tasks=angle.tasks||[];
  const doneCnt=tasks.filter(t=>t.done).length;
  tasksHdr.appendChild(h("div",{class:"angle-section-title"},`Tasks (${doneCnt}/${tasks.length})`));
  tasksHdr.appendChild(h("button",{class:"btn btn-ghost btn-xs",onclick:()=>openTaskModal(pid,aid,angle,null)},"+ Add"));
  body.appendChild(tasksHdr);
  if(tasks.length){
    const tlist=h("div",{class:"tasks-list"});
    tasks.forEach((t,i)=>{
      const row=h("div",{class:"task-row"});
      const chk=h("div",{class:"tcheck"+(t.done?" done":""),onclick:()=>{state.products[pid].angles[aid].tasks[i].done=!t.done;save();render();}});
      if(t.done)chk.textContent="✓";
      row.appendChild(chk);
      const tb2=h("div",{style:"flex:1;min-width:0"});
      tb2.appendChild(h("div",{class:"ttitle"+(t.done?" done":"")},t.title));
      const meta=h("div",{class:"tmeta"});
      if(t.assignee) meta.appendChild(css(h("span",{},"👤 "+t.assignee),{fontSize:"10px",color:"#6b7280"}));
      if(t.due)      meta.appendChild(css(h("span",{},"📅 "+t.due),{fontSize:"10px",color:"#a89f94"}));
      if(meta.children.length) tb2.appendChild(meta);
      row.appendChild(tb2);
      const acts=h("div",{class:"tact"});
      acts.appendChild(h("button",{class:"iBtn",onclick:()=>openTaskModal(pid,aid,angle,i)},"✎"));
      acts.appendChild(css(h("button",{class:"iBtn",onclick:()=>{state.products[pid].angles[aid].tasks.splice(i,1);save();render();}},"×"),{background:"#fee2e2",color:"#dc2626"}));
      row.appendChild(acts);
      tlist.appendChild(row);
    });
    body.appendChild(tlist);
  } else {
    body.appendChild(css(h("div",{},"No tasks yet"),{fontSize:"11px",color:"#c4b8af",fontStyle:"italic"}));
  }

  card.appendChild(body);

  // Toggle expand
  const toggleBtn=css(h("button",{onclick:()=>{
    expanded=!expanded;
    body.style.display=expanded?"block":"none";
    toggleBtn.textContent=expanded?"▲ Collapse":"▼ Brief & Tasks";
  }},{}),"▼ Brief & Tasks");
  css(toggleBtn,{width:"100%",padding:"9px",border:"none",borderTop:"1px solid #f5f0eb",background:"#faf8f5",color:"#6b7280",fontSize:"11px",fontWeight:"700",cursor:"pointer",letterSpacing:".04em"});
  card.appendChild(toggleBtn);

  return card;
}

// ══ MODALS ══

function openProductModal(id=null,p=null){
  const isEdit=!!id;
  const bg=h("div",{class:"modal-bg"});
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  const modal=h("div",{class:"modal"});
  const mh=h("div",{class:"mhead"});
  mh.appendChild(h("div",{class:"mtitle"},isEdit?"Edit Product":"New Product"));
  mh.appendChild(h("button",{class:"mclose",onclick:()=>bg.remove()},"×"));
  modal.appendChild(mh);
  const mb=h("div",{class:"mbody"});
  const nr=h("div",{class:"frow"});
  nr.appendChild(h("label",{class:"label"},"Product Name"));
  const ni=h("input",{class:"input",placeholder:"e.g. Sun Veil Illuminator",value:p?.name||""});
  nr.appendChild(ni);mb.appendChild(nr);
  modal.appendChild(mb);
  const mf=h("div",{class:"mfoot"});
  mf.appendChild(h("button",{class:"btn btn-ghost",onclick:()=>bg.remove()},"Cancel"));
  mf.appendChild(h("button",{class:"btn btn-dark",onclick:()=>{
    const name=ni.value.trim();if(!name)return;
    if(isEdit){state.products[id].name=name;}
    else{const nid=genId();state.products[nid]={name,strategy:{},angles:{}};}
    save();render();bg.remove();
  }},isEdit?"Save":"Create Product"));
  modal.appendChild(mf);
  bg.appendChild(modal);document.body.appendChild(bg);
  setTimeout(()=>ni.focus(),50);
}

function openAngleModal(pid,p,prefill=null,aid=null,existing=null){
  const isEdit=!!aid;
  const bg=h("div",{class:"modal-bg"});
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  const modal=h("div",{class:"modal"});
  const mh=h("div",{class:"mhead"});
  mh.appendChild(h("div",{class:"mtitle"},isEdit?"Edit Angle":"New Angle"));
  mh.appendChild(h("button",{class:"mclose",onclick:()=>bg.remove()},"×"));
  modal.appendChild(mh);
  const mb=h("div",{class:"mbody"});

  // Name
  const nr=h("div",{class:"frow"});
  nr.appendChild(h("label",{class:"label"},"Angle Name"));
  const ni=h("input",{class:"input",placeholder:"e.g. Serum-like texture angle, Confidence angle…",value:existing?.name||""});
  nr.appendChild(ni);mb.appendChild(nr);

  // Color
  let selColor=existing?.color||prefill?.color||ANGLE_COLORS[0];
  const cr=h("div",{class:"frow"});
  cr.appendChild(h("label",{class:"label"},"Color"));
  const cp=h("div",{class:"color-picker"});
  ANGLE_COLORS.forEach(c=>{
    const dot=css(h("div",{class:"cpick"+(selColor===c?" selected":""),onclick:()=>{
      selColor=c;
      cp.querySelectorAll(".cpick").forEach(d=>d.classList.remove("selected"));
      dot.classList.add("selected");
    }}),{background:c});
    cp.appendChild(dot);
  });
  cr.appendChild(cp);mb.appendChild(cr);

  // Stage
  let selStage=existing?.stage||"Strategy";
  const stgr=h("div",{class:"frow"});
  stgr.appendChild(h("label",{class:"label"},"Current Stage"));
  const ss=h("div",{class:"stage-sel"});
  STAGES.forEach(s=>{
    const sc=SC[s];
    const btn=h("button",{class:"sstage",onclick:()=>{
      selStage=s;
      ss.querySelectorAll(".sstage").forEach(b=>{b.style.background="";b.style.borderColor="";b.style.color="";});
      Object.assign(btn.style,{background:sc.bg,borderColor:sc.color,color:sc.color});
    }},s);
    if(selStage===s) Object.assign(btn.style,{background:sc.bg,borderColor:sc.color,color:sc.color});
    ss.appendChild(btn);
  });
  stgr.appendChild(ss);mb.appendChild(stgr);

  // Source answer picker
  let selSource=null;
  if(prefill){
    selSource={qId:prefill.qId,answerId:prefill.answerId,text:prefill.answerText};
  } else if(existing?.sourceAnswerId){
    selSource={qId:existing.sourceQId,answerId:existing.sourceAnswerId,text:existing.sourceAnswerText};
  }

  const allAnswers=getAnswersFlat(p);
  if(allAnswers.length>0){
    const sr2=h("div",{class:"frow"});
    sr2.appendChild(h("label",{class:"label"},"Branch from Strategy Answer (optional)"));
    sr2.appendChild(css(h("div",{},"Which strategy answer inspired this angle?"),{fontSize:"11px",color:"#a89f94",marginBottom:"8px"}));
    const sList=h("div",{class:"source-list"});
    allAnswers.forEach(a=>{
      const item=h("div",{class:"source-item"+(selSource?.answerId===a.answerId?" selected":""),onclick:()=>{
        if(selSource?.answerId===a.answerId){selSource=null;item.classList.remove("selected");}
        else{selSource={qId:a.qId,answerId:a.answerId,text:a.text};sList.querySelectorAll(".source-item").forEach(i=>i.classList.remove("selected"));item.classList.add("selected");}
      }});
      item.appendChild(h("div",{class:"source-q"},STRATEGY_QS.find(q=>q.id===a.qId)?.label||a.qId));
      item.appendChild(h("div",{class:"source-a"},'"'+a.text+'"'));
      sList.appendChild(item);
    });
    sr2.appendChild(sList);mb.appendChild(sr2);
  }

  modal.appendChild(mb);
  const mf=h("div",{class:"mfoot"});
  mf.appendChild(h("button",{class:"btn btn-ghost",onclick:()=>bg.remove()},"Cancel"));
  mf.appendChild(h("button",{class:"btn btn-dark",onclick:()=>{
    const name=ni.value.trim();if(!name)return;
    if(!state.products[pid].angles) state.products[pid].angles={};
    const angleData={
      name, color:selColor, stage:selStage,
      sourceQId:selSource?.qId||null,
      sourceAnswerId:selSource?.answerId||null,
      sourceAnswerText:selSource?.text||null,
      brief:existing?.brief||{},
      tasks:existing?.tasks||[],
    };
    if(isEdit) state.products[pid].angles[aid]={...state.products[pid].angles[aid],...angleData};
    else state.products[pid].angles[genId()]=angleData;
    save();detailTab="angles";render();bg.remove();
  }},isEdit?"Save Angle":"Create Angle"));
  modal.appendChild(mf);
  bg.appendChild(modal);document.body.appendChild(bg);
  setTimeout(()=>ni.focus(),50);
}

function openBriefModal(pid,aid,angle){
  const bg=h("div",{class:"modal-bg"});
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  const modal=h("div",{class:"modal"});
  const mh=h("div",{class:"mhead"});
  mh.appendChild(h("div",{class:"mtitle"},"Brief — "+angle.name));
  mh.appendChild(h("button",{class:"mclose",onclick:()=>bg.remove()},"×"));
  modal.appendChild(mh);
  const mb=h("div",{class:"mbody"});
  // Pre-fill core insight from source answer
  const brief={...(angle.brief||{})};
  if(angle.sourceAnswerText&&!brief.objective) brief.objective=angle.sourceAnswerText;
  BRIEF_FIELDS.forEach(f=>{
    const r=h("div",{class:"frow"});
    r.appendChild(h("label",{class:"label"},f.label));
    const ta=h("textarea",{class:"input",placeholder:f.ph});
    ta.value=brief[f.key]||"";
    ta.oninput=e=>{brief[f.key]=e.target.value;};
    r.appendChild(ta);mb.appendChild(r);
  });
  modal.appendChild(mb);
  const mf=h("div",{class:"mfoot"});
  mf.appendChild(h("button",{class:"btn btn-ghost",onclick:()=>bg.remove()},"Cancel"));
  mf.appendChild(h("button",{class:"btn btn-dark",onclick:()=>{
    state.products[pid].angles[aid].brief=brief;save();render();bg.remove();
  }},"Save Brief"));
  modal.appendChild(mf);
  bg.appendChild(modal);document.body.appendChild(bg);
}

function openTaskModal(pid,aid,angle,tidx){
  const isEdit=tidx!==null;
  const ex=isEdit?angle.tasks[tidx]:{};
  const bg=h("div",{class:"modal-bg"});
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  const modal=h("div",{class:"modal"});
  const mh=h("div",{class:"mhead"});
  mh.appendChild(h("div",{class:"mtitle"},isEdit?"Edit Task":"Add Task — "+angle.name));
  mh.appendChild(h("button",{class:"mclose",onclick:()=>bg.remove()},"×"));
  modal.appendChild(mh);
  const mb=h("div",{class:"mbody"});
  const vals={title:ex.title||"",assignee:ex.assignee||"",due:ex.due||"",notes:ex.notes||""};
  [{key:"title",label:"Task",type:"input",ph:"e.g. Film UGC demo"},
   {key:"assignee",label:"Assigned To",type:"input",ph:"e.g. Amber"},
   {key:"due",label:"Due Date",type:"input",ph:"e.g. March 20"},
   {key:"notes",label:"Notes",type:"textarea",ph:"Any extra context…"}
  ].forEach(f=>{
    const r=h("div",{class:"frow"});
    r.appendChild(h("label",{class:"label"},f.label));
    const el=f.type==="textarea"?h("textarea",{class:"input",placeholder:f.ph}):h("input",{class:"input",placeholder:f.ph});
    el.value=vals[f.key];el.oninput=e=>{vals[f.key]=e.target.value;};
    r.appendChild(el);mb.appendChild(r);
  });
  modal.appendChild(mb);
  const mf=h("div",{class:"mfoot"});
  mf.appendChild(h("button",{class:"btn btn-ghost",onclick:()=>bg.remove()},"Cancel"));
  mf.appendChild(h("button",{class:"btn btn-dark",onclick:()=>{
    if(!vals.title.trim())return;
    const task={id:genId(),...vals,done:ex.done||false};
    if(!state.products[pid].angles[aid].tasks) state.products[pid].angles[aid].tasks=[];
    if(isEdit) state.products[pid].angles[aid].tasks[tidx]=task;
    else state.products[pid].angles[aid].tasks.push(task);
    save();render();bg.remove();
  }},isEdit?"Save Task":"Add Task"));
  modal.appendChild(mf);
  bg.appendChild(modal);document.body.appendChild(bg);
}

else document.addEventListener("fb-ready",initFB);
